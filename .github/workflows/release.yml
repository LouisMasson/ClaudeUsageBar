name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Build & package
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          VERSION="${GIT_TAG#v}"
          chmod +x make_app.sh
          VERSION=$VERSION ./make_app.sh

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "ClaudeUsageBar-*.dmg"
          generate_release_notes: true
